<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau de bord SNCF</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }
        
        body {
            background-color: #003366;
            color: white;
            height: 100vh;
            overflow: hidden;
        }
        
        .board {
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: #003366;
            padding: 30px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid #ffcc00;
            flex-shrink: 0;
        }
        
        .line-train-info {
            display: flex;
            align-items: center;
            gap: 25px;
        }
        
        .line-badge {
            font-size: 42px;
            font-weight: bold;
            background: #ffcc00;
            color: white;
            padding: 15px 30px;
            border-radius: 8px;
            min-width: 120px;
            text-align: center;
        }
        
        .train-number {
            font-size: 32px;
            font-weight: bold;
            color: white;
        }
        
        .destination {
            flex-grow: 1;
            text-align: center;
            font-size: 36px;
            font-weight: bold;
            color: white;
            padding: 0 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .current-time {
            font-size: 32px;
            font-weight: bold;
            color: white;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            border-radius: 8px;
        }
        
        .stops-container {
            background: white;
            flex-grow: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        .stops-list {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        .timeline {
            position: absolute;
            left: 40px;
            top: 0;
            bottom: 0;
            width: 6px;
            background-color: #cccccc;
            z-index: 1;
        }
        
        .stop-item {
            padding: 30px 40px 30px 90px;
            border-bottom: 2px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            flex-shrink: 0;
            min-height: 100px;
        }
        
        .stop-item:last-child {
            border-bottom: none;
        }
        
        .stop-dot {
            position: absolute;
            left: 35px;
            top: 50%;
            transform: translateY(-50%);
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background-color: #cccccc;
            z-index: 2;
            border: 3px solid white;
            box-shadow: 0 0 0 1px #e0e0e0;
        }
        
        .stop-dot.active {
            width: 26px;
            height: 26px;
            left: 33px;
            box-shadow: 0 0 0 4px rgba(255, 204, 0, 0.3);
        }
        
        .stop-name {
            font-size: 32px;
            color: #333;
            font-weight: 500;
        }
        
        .stop-time {
            font-size: 32px;
            color: #333;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .scheduled-time {
            text-decoration: line-through;
            color: #ff6b6b;
            font-size: 28px;
            opacity: 0.7;
        }
        
        .actual-time {
            color: #333;
            font-weight: bold;
        }
        
        .stop-delay {
            color: #d32f2f;
            font-size: 24px;
            background: rgba(211, 47, 47, 0.1);
            padding: 5px 10px;
            border-radius: 4px;
        }
        
        .stop-on-time {
            color: #4CAF50;
            font-size: 24px;
            background: rgba(76, 175, 80, 0.1);
            padding: 5px 10px;
            border-radius: 4px;
        }
        
        .more-stops-indicator {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 36px;
            background: #f5f5f5;
            flex-shrink: 0;
            position: relative;
        }
        
        .more-stops-indicator::before {
            content: '';
            position: absolute;
            left: 40px;
            top: 0;
            bottom: 0;
            width: 6px;
            background-color: #cccccc;
        }
        
        .more-stops-arrow {
            position: absolute;
            left: 37px;
            top: 50%;
            transform: translateY(-50%);
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3;
        }
        
        .no-more-stops {
            height: 20px;
            flex-shrink: 0;
        }
        
        .loading, .error {
            padding: 60px 40px;
            text-align: center;
            font-size: 28px;
            color: #333;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .error {
            color: #d32f2f;
        }
        
        .footer {
            padding: 20px 40px;
            background: #f9f9f9;
            border-top: 2px solid #ddd;
            text-align: center;
            color: #666;
            font-size: 18px;
            flex-shrink: 0;
        }
        
        /* Анимация движения табло */
        @keyframes slideUp {
            0% { transform: translateY(0); }
            100% { transform: translateY(-100px); }
        }
        
        .sliding-up {
            animation: slideUp 0.8s ease forwards;
        }

        .header-delay {
            background: #ffebee;
            color: #d32f2f;
            padding: 10px 20px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            border-bottom: 2px solid #ffcdd2;
        }

        .realtime-indicator {
            background: #e8f5e8;
            color: #2e7d32;
            padding: 8px 20px;
            text-align: center;
            font-size: 24px;
            border-bottom: 2px solid #c8e6c9;
        }

        .theoretical-indicator {
            background: #fff3e0;
            color: #ef6c00;
            padding: 8px 20px;
            text-align: center;
            font-size: 24px;
            border-bottom: 2px solid #ffcc80;
        }

        /* Новые стили для статуса остановок */
        .stop-passed {
            opacity: 0.6;
        }
        
        .stop-passed .stop-dot {
            background-color: #cccccc !important;
        }
        
        .stop-passed .stop-name,
        .stop-passed .stop-time {
            color: #999 !important;
        }

        .stop-current {
            background-color: #f5f5f5;
        }
    </style>
</head>
<body>
    <div class="board">
        <div class="header">
            <div class="line-train-info">
                <div class="line-badge" id="line-name">...</div>
                <div class="train-number" id="train-number"></div>
            </div>
            <div class="destination" id="destination-name">...</div>
            <div class="current-time" id="current-time">--:--:--</div>
        </div>
        
        <div id="realtime-indicator" class="realtime-indicator" style="display: none;"></div>
        
        <div id="delay-header" class="header-delay" style="display: none;"></div>
        
        <div class="stops-container">
            <div class="stops-list" id="stops-list">
                <div class="timeline" id="timeline"></div>
                <div class="loading" id="loading">Chargement des données...</div>
                <div class="error" id="error" style="display: none;"></div>
            </div>
        </div>
        
        <div class="more-stops-indicator" id="more-indicator" style="display: none;">
            <div class="more-stops-arrow">▼</div>
        </div>
        <div class="no-more-stops" id="no-more-indicator"></div>
        
        <div class="footer">
            Information voyageur SNCF - Temps réel
        </div>
    </div>

    <script>
        // Конфигурация
        const CONFIG = {
            UPDATE_INTERVAL: 30000, // 30 секунд
            MAX_VISIBLE_STOPS: 5,   // Максимум видимых остановок
            WORKER_URL: 'https://api.dmytrothemir.workers.dev'
        };
        
        // Состояние приложения
        const state = {
            currentTrainData: null,
            currentLineColor: '#ffcc00',
            nextStopIndex: -1,
            lastUpdateTime: null,
            autoRefreshInterval: null
        };
        
        // Цвета для разных типов поездов
        const TRAIN_COLORS = {
            'TER': '#0052a3',      // Синий
            'TER_K': '#0052a3',    // Синий для K-линий
            'TGV': '#ed1c24',      // Красный
            'TRANSILIEN': '#f9b000', // Желтый
            'INTERCITES': '#009ade', // Голубой
            'RER': '#6e267b',      // Фиолетовый
            'TRAM': '#00a550',     // Зеленый
            'DEFAULT': '#ffcc00'   // Желтый по умолчанию
        };
        
        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            updateCurrentTime();
            loadTrainData();
            startAutoRefresh();
        });
        
        // Обновление текущего времени
        function updateCurrentTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('fr-FR', { 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            });
            document.getElementById('current-time').textContent = timeString;
            setTimeout(updateCurrentTime, 1000);
        }
        
        // Получить ID поезда из URL
        function getTrainIdFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            
            if (!id) {
                showError("ID du train manquant dans l'URL. Utilisez ?id=...");
                return null;
            }
            
            return id;
        }
        
        // Загрузить данные поезда
        async function loadTrainData() {
            const trainId = getTrainIdFromUrl();
            if (!trainId) return;
            
            console.log(`Chargement des données pour le train: ${trainId}`);
            
            try {
                const response = await fetch(`${CONFIG.WORKER_URL}/?id=${encodeURIComponent(trainId)}`);
                
                if (!response.ok) {
                    throw new Error(`Erreur HTTP: ${response.status}`);
                }
                
                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error);
                }
                
                state.currentTrainData = data;
                state.lastUpdateTime = new Date();
                
                displayTrainData(data);
                
            } catch (error) {
                console.error('Erreur de chargement:', error);
                showError(`Erreur: ${error.message || 'Impossible de charger les données'}`);
            }
        }
        
        // Отобразить данные поезда
        function displayTrainData(data) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'none';
            
            try {
                const vehicleJourney = data.vehicle_journeys?.[0];
                
                if (!vehicleJourney) {
                    throw new Error("Aucune information de voyage trouvée");
                }
                
                // Отладка: показать структуру данных
                console.log('Données du train:', vehicleJourney);
                
                // Обработка остановок
                const stopTimes = vehicleJourney.stop_times || [];
                
                // Определить название линии
                const lineInfo = determineLineInfo(vehicleJourney);
                
                // Определить наличие данных реального времени
                const hasRealTimeData = data.has_real_time_data || checkForRealTimeData(vehicleJourney);
                
                // Определить задержки
                const delays = analyzeDelays(vehicleJourney);
                
                // Обновить заголовок
                updateHeader(vehicleJourney, lineInfo);
                
                // Обновить индикаторы
                updateIndicators(hasRealTimeData, delays);
                
                // Отобразить остановки
                displayStops(stopTimes, lineInfo.color, delays, hasRealTimeData);
                
            } catch (error) {
                console.error('Erreur d\'affichage:', error);
                showError(`Erreur d'affichage: ${error.message}`);
            }
        }
        
        // Определить информацию о линии
        function determineLineInfo(vehicleJourney) {
            const headsign = vehicleJourney.headsign || '';
            const name = vehicleJourney.name || '';
            
            let lineName = headsign || name;
            let lineColor = TRAIN_COLORS.DEFAULT;
            let trainType = 'TER';
            
            // Определяем тип поезда по headsign
            if (headsign.startsWith('K')) {
                // TER K-lines (Hauts-de-France)
                trainType = 'TER_K';
                lineColor = TRAIN_COLORS.TER_K;
                lineName = headsign;
            } else if (headsign.includes('TER')) {
                trainType = 'TER';
                lineColor = TRAIN_COLORS.TER;
            } else if (headsign.includes('TGV')) {
                trainType = 'TGV';
                lineColor = TRAIN_COLORS.TGV;
            } else if (headsign.includes('Transilien')) {
                trainType = 'TRANSILIEN';
                lineColor = TRAIN_COLORS.TRANSILIEN;
            } else if (headsign.includes('Intercités')) {
                trainType = 'INTERCITES';
                lineColor = TRAIN_COLORS.INTERCITES;
            } else if (headsign.includes('RER')) {
                trainType = 'RER';
                lineColor = TRAIN_COLORS.RER;
            } else if (headsign.match(/^[A-Z]$/)) {
                // Single letter lines (TGV, etc)
                trainType = 'TGV';
                lineColor = TRAIN_COLORS.TGV;
            }
            
            return {
                name: lineName,
                color: lineColor,
                type: trainType
            };
        }
        
        // Проверить наличие данных реального времени
        function checkForRealTimeData(vehicleJourney) {
            if (!vehicleJourney?.stop_times) return false;
            
            for (const stop of vehicleJourney.stop_times) {
                if (stop.amended_departure_time || stop.amended_arrival_time) return true;
                if (stop.base_departure_time && stop.base_departure_time !== stop.departure_time) return true;
                if (stop.base_arrival_time && stop.base_arrival_time !== stop.arrival_time) return true;
                if (stop.arrival_status === 'DELAYED' || stop.departure_status === 'DELAYED') return true;
                if (stop.delay && stop.delay > 0) return true;
                if (stop.data_freshness === 'realtime') return true;
            }
            
            return false;
        }
        
        // Анализировать задержки
        function analyzeDelays(vehicleJourney) {
            const delays = {};
            
            if (!vehicleJourney?.stop_times) return delays;
            
            vehicleJourney.stop_times.forEach(stop => {
                if (stop.skipped_stop) return;
                
                const stopId = stop.stop_point?.id;
                if (!stopId) return;
                
                let delayMinutes = 0;
                
                // Использовать явную задержку (в секундах)
                if (stop.delay && stop.delay > 0) {
                    delayMinutes = Math.round(stop.delay / 60);
                }
                // Или вычислить разницу между base и amended
                else if (stop.base_departure_time && stop.amended_departure_time) {
                    const base = timeToMinutes(stop.base_departure_time);
                    const amended = timeToMinutes(stop.amended_departure_time);
                    delayMinutes = amended - base;
                }
                // Или разницу между base и current
                else if (stop.base_departure_time && stop.departure_time) {
                    const base = timeToMinutes(stop.base_departure_time);
                    const current = timeToMinutes(stop.departure_time);
                    delayMinutes = current - base;
                }
                
                if (delayMinutes > 0) {
                    delays[stopId] = delayMinutes;
                }
            });
            
            return delays;
        }
        
        // Преобразовать время HHMMSS в минуты
        function timeToMinutes(timeStr) {
            if (!timeStr || timeStr.length !== 6) return 0;
            const hours = parseInt(timeStr.substring(0, 2), 10);
            const minutes = parseInt(timeStr.substring(2, 4), 10);
            return hours * 60 + minutes;
        }
        
        // Обновить заголовок
        function updateHeader(vehicleJourney, lineInfo) {
            // Линия
            document.getElementById('line-name').textContent = lineInfo.name;
            document.getElementById('line-name').style.backgroundColor = lineInfo.color;
            
            // Номер поезда
            const trainNumber = vehicleJourney.name || vehicleJourney.id?.split(':')[3] || 'N/A';
            document.getElementById('train-number').textContent = trainNumber;
            
            // Пункт назначения
            const stopTimes = vehicleJourney.stop_times || [];
            let destination = 'Destination inconnue';
            
            for (let i = stopTimes.length - 1; i >= 0; i--) {
                if (!stopTimes[i].skipped_stop) {
                    destination = stopTimes[i].stop_point?.name || 'Destination inconnue';
                    break;
                }
            }
            
            document.getElementById('destination-name').textContent = destination;
            
            // Сохранить цвет линии
            state.currentLineColor = lineInfo.color;
            document.getElementById('timeline').style.backgroundColor = lineInfo.color;
        }
        
        // Обновить индикаторы
        function updateIndicators(hasRealTimeData, delays) {
            const realtimeIndicator = document.getElementById('realtime-indicator');
            const delayHeader = document.getElementById('delay-header');
            
            // Индикатор реального времени
            if (hasRealTimeData) {
                realtimeIndicator.textContent = '✅ Données temps réel';
                realtimeIndicator.className = 'realtime-indicator';
                realtimeIndicator.style.display = 'block';
            } else {
                realtimeIndicator.textContent = '⚠️ Données théoriques';
                realtimeIndicator.className = 'theoretical-indicator';
                realtimeIndicator.style.display = 'block';
            }
            
            // Индикатор задержки
            const maxDelay = Math.max(...Object.values(delays), 0);
            if (maxDelay > 0) {
                delayHeader.textContent = `⚠️ Retard : ${maxDelay} minute${maxDelay > 1 ? 's' : ''}`;
                delayHeader.style.display = 'block';
            } else {
                delayHeader.style.display = 'none';
            }
        }
        
        // Отобразить остановки
        function displayStops(stopTimes, lineColor, delays, hasRealTimeData) {
            const stopsList = document.getElementById('stops-list');
            const moreIndicator = document.getElementById('more-indicator');
            const noMoreIndicator = document.getElementById('no-more-indicator');
            
            // Очистить существующие остановки
            stopsList.querySelectorAll('.stop-item').forEach(el => el.remove());
            
            if (stopTimes.length === 0) {
                const emptyMsg = document.createElement('div');
                emptyMsg.className = 'loading';
                emptyMsg.textContent = 'Aucun arrêt trouvé';
                stopsList.appendChild(emptyMsg);
                moreIndicator.style.display = 'none';
                noMoreIndicator.style.display = 'block';
                return;
            }
            
            // Определить текущее время
            const currentMinutes = getCurrentMinutes();
            
            // Найти текущую/следующую остановку
            let currentStopIndex = -1;
            let stopStatuses = [];
            
            for (let i = 0; i < stopTimes.length; i++) {
                const stop = stopTimes[i];
                if (stop.skipped_stop) {
                    stopStatuses.push('skipped');
                    continue;
                }
                
                const stopTime = stop.departure_time || stop.arrival_time;
                const stopMinutes = timeToMinutes(stopTime);
                
                let status = 'upcoming';
                if (stopMinutes < currentMinutes - 5) {
                    status = 'passed';
                } else if (stopMinutes <= currentMinutes + 5) {
                    status = 'current';
                }
                
                if (status === 'current' && currentStopIndex === -1) {
                    currentStopIndex = i;
                }
                
                stopStatuses.push(status);
            }
            
            // Если текущая остановка не найдена, показываем следующую
            if (currentStopIndex === -1) {
                for (let i = 0; i < stopStatuses.length; i++) {
                    if (stopStatuses[i] === 'upcoming') {
                        currentStopIndex = i;
                        break;
                    }
                }
            }
            
            // Если все остановки прошли, показываем последнюю
            if (currentStopIndex === -1) {
                currentStopIndex = stopTimes.length - 1;
            }
            
            // Отобразить остановки (начиная с текущей/следующей)
            let stopsShown = 0;
            
            for (let i = currentStopIndex; i < stopTimes.length && stopsShown < CONFIG.MAX_VISIBLE_STOPS; i++) {
                const stop = stopTimes[i];
                if (stop.skipped_stop) continue;
                
                const stopItem = createStopElement(stop, stopStatuses[i], lineColor, delays, hasRealTimeData);
                stopsList.appendChild(stopItem);
                stopsShown++;
            }
            
            // Показать индикатор дополнительных остановок
            const remainingStops = stopTimes.length - (currentStopIndex + stopsShown);
            if (remainingStops > 0) {
                moreIndicator.style.display = 'block';
                noMoreIndicator.style.display = 'none';
                moreIndicator.querySelector('.more-stops-arrow').style.color = lineColor;
            } else {
                moreIndicator.style.display = 'none';
                noMoreIndicator.style.display = 'block';
            }
        }
        
        // Создать элемент остановки
        function createStopElement(stop, status, lineColor, delays, hasRealTimeData) {
            const stopItem = document.createElement('div');
            stopItem.className = 'stop-item';
            
            if (status === 'passed') {
                stopItem.classList.add('stop-passed');
            } else if (status === 'current') {
                stopItem.classList.add('stop-current');
            }
            
            // Точка на линии
            const stopDot = document.createElement('div');
            stopDot.className = 'stop-dot';
            if (status === 'current') {
                stopDot.classList.add('active');
            }
            stopDot.style.backgroundColor = status === 'passed' ? '#cccccc' : lineColor;
            
            // Название остановки
            const stopName = document.createElement('div');
            stopName.className = 'stop-name';
            stopName.textContent = stop.stop_point?.name || 'Arrêt inconnu';
            
            // Информация о времени
            const stopTime = document.createElement('div');
            stopTime.className = 'stop-time';
            
            const stopId = stop.stop_point?.id;
            const delayMinutes = delays[stopId] || 0;
            
            // Форматировать время
            const timeStr = stop.departure_time || stop.arrival_time;
            const formattedTime = timeStr 
                ? `${timeStr.substring(0, 2)}:${timeStr.substring(2, 4)}`
                : '--:--';
            
            // Показать задержку если есть
            if (delayMinutes > 0 && hasRealTimeData) {
                const baseTime = stop.base_departure_time || timeStr;
                const baseFormatted = baseTime 
                    ? `${baseTime.substring(0, 2)}:${baseTime.substring(2, 4)}`
                    : '--:--';
                
                const scheduledSpan = document.createElement('span');
                scheduledSpan.className = 'scheduled-time';
                scheduledSpan.textContent = baseFormatted;
                
                const actualSpan = document.createElement('span');
                actualSpan.className = 'actual-time';
                actualSpan.textContent = formattedTime;
                
                const delaySpan = document.createElement('span');
                delaySpan.className = 'stop-delay';
                delaySpan.textContent = `+${delayMinutes} min`;
                
                stopTime.appendChild(scheduledSpan);
                stopTime.appendChild(actualSpan);
                stopTime.appendChild(delaySpan);
            } else {
                stopTime.textContent = formattedTime;
                
                // Показать "À l'heure" для текущей остановки
                if (status === 'current' && hasRealTimeData) {
                    const onTimeSpan = document.createElement('span');
                    onTimeSpan.className = 'stop-on-time';
                    onTimeSpan.textContent = 'À l\'heure';
                    stopTime.appendChild(onTimeSpan);
                }
            }
            
            // Собрать элементы
            stopItem.appendChild(stopDot);
            stopItem.appendChild(stopName);
            stopItem.appendChild(stopTime);
            
            return stopItem;
        }
        
        // Получить текущее время в минутах
        function getCurrentMinutes() {
            const now = new Date();
            return now.getHours() * 60 + now.getMinutes();
        }
        
        // Показать ошибку
        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('error').textContent = message;
            document.getElementById('delay-header').style.display = 'none';
            document.getElementById('realtime-indicator').style.display = 'none';
        }
        
        // Запустить автообновление
        function startAutoRefresh() {
            if (state.autoRefreshInterval) {
                clearInterval(state.autoRefreshInterval);
            }
            
            state.autoRefreshInterval = setInterval(() => {
                loadTrainData();
            }, CONFIG.UPDATE_INTERVAL);
        }
        
        // Остановить автообновление
        function stopAutoRefresh() {
            if (state.autoRefreshInterval) {
                clearInterval(state.autoRefreshInterval);
                state.autoRefreshInterval = null;
            }
        }
        
        // Экспортировать функции для отладки
        window.appState = state;
        window.reloadData = loadTrainData;
        window.stopRefresh = stopAutoRefresh;
        window.startRefresh = startAutoRefresh;
    </script>
</body>
</html>
