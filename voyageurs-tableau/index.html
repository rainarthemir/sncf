<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau de bord SNCF</title>
    <style>
        /* Стили остаются такими же, только добавлю новый класс */
        .stop-passed {
            opacity: 0.6;
        }
        
        .stop-passed .stop-dot {
            background-color: #cccccc !important;
        }
        
        .stop-passed .stop-name,
        .stop-passed .stop-time {
            color: #999 !important;
        }
    </style>
</head>
<body>
    <div class="board">
        <div class="header">
            <div class="line-train-info">
                <div class="line-badge" id="line-name">...</div>
                <div class="train-number" id="train-number"></div>
            </div>
            <div class="destination" id="destination-name">...</div>
            <div class="current-time" id="current-time">--:--:--</div>
        </div>
        
        <div id="realtime-indicator" class="realtime-indicator" style="display: none;">
            ✅ Données temps réel
        </div>
        
        <div id="delay-header" class="header-delay" style="display: none;"></div>
        
        <div class="stops-container">
            <div class="stops-list" id="stops-list">
                <div class="timeline" id="timeline"></div>
                <div class="loading" id="loading">Chargement des données...</div>
                <div class="error" id="error" style="display: none;"></div>
            </div>
        </div>
        
        <div class="more-stops-indicator" id="more-indicator" style="display: none;">
            <div class="more-stops-arrow">▼</div>
        </div>
        <div class="no-more-stops" id="no-more-indicator"></div>
        
        <div class="footer">
            Information voyageur SNCF - Temps réel
        </div>
    </div>

    <script>
        let currentNextStopIndex = -1;
        let currentLineColor = "#cccccc";
        let currentTrainData = null;
        
        // Mettre à jour l'heure en temps réel
        function updateTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('fr-FR', { 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            });
            document.getElementById('current-time').textContent = timeString;
        }
        
        setInterval(updateTime, 1000);
        updateTime();
        
        // Récupérer l'ID du train depuis l'URL
        function getTrainIdFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('id');
        }
        
        // Простая конвертация времени HHMMSS в минуты дня
        function timeToMinutes(timeStr) {
            if (!timeStr || timeStr.length !== 6) return 0;
            const hours = parseInt(timeStr.substring(0, 2));
            const minutes = parseInt(timeStr.substring(2, 4));
            return hours * 60 + minutes;
        }
        
        // Получить текущее время в минутах дня
        function getCurrentMinutes() {
            const now = new Date();
            return now.getHours() * 60 + now.getMinutes();
        }
        
        // Определить статус остановки (прошла/предстоит)
        function getStopStatus(stop, currentMinutes) {
            const stopTime = stop.departure_time || stop.arrival_time;
            const stopMinutes = timeToMinutes(stopTime);
            
            if (stopMinutes === 0) return 'unknown';
            if (stopMinutes < currentMinutes - 5) return 'passed'; // Прошла больше 5 минут назад
            if (stopMinutes <= currentMinutes) return 'current'; // В пределах последних 5 минут
            return 'upcoming'; // Предстоит
        }
        
        // Найти индекс текущей/следующей остановки
        function findCurrentStopIndex(stopTimes) {
            const currentMinutes = getCurrentMinutes();
            
            for (let i = 0; i < stopTimes.length; i++) {
                const stop = stopTimes[i];
                if (stop.skipped_stop) continue;
                
                const status = getStopStatus(stop, currentMinutes);
                if (status === 'current' || status === 'upcoming') {
                    return i;
                }
            }
            
            // Если все остановки прошли, показываем последнюю
            return stopTimes.length - 1;
        }
        
        // Простая проверка на реальное время
        function hasRealTimeDataSimple(vehicleJourney) {
            if (!vehicleJourney || !vehicleJourney.stop_times) return false;
            
            for (const stop of vehicleJourney.stop_times) {
                if (stop.amended_departure_time || stop.amended_arrival_time ||
                    stop.base_departure_time !== stop.departure_time ||
                    stop.base_arrival_time !== stop.arrival_time ||
                    stop.arrival_status === 'DELAYED' ||
                    stop.departure_status === 'DELAYED' ||
                    (stop.delay && stop.delay > 0) ||
                    (stop.data_freshness && stop.data_freshness === 'realtime')) {
                    return true;
                }
            }
            return false;
        }
        
        // Простой анализ задержек
        function analyzeDelaysSimple(vehicleJourney) {
            const delays = {};
            
            if (!vehicleJourney.stop_times) return delays;
            
            vehicleJourney.stop_times.forEach(stop => {
                if (stop.skipped_stop) return;
                
                const stopId = stop.stop_point?.id;
                if (!stopId) return;
                
                let delayMinutes = 0;
                
                // Простая логика: если есть явная задержка
                if (stop.delay && stop.delay > 0) {
                    delayMinutes = Math.round(stop.delay / 60);
                }
                // Или если есть разница между base и current временем
                else if (stop.base_departure_time && stop.departure_time && 
                         stop.base_departure_time !== stop.departure_time) {
                    const base = timeToMinutes(stop.base_departure_time);
                    const current = timeToMinutes(stop.departure_time);
                    if (current > base) {
                        delayMinutes = current - base;
                    }
                }
                
                if (delayMinutes > 0) {
                    delays[stopId] = delayMinutes;
                }
            });
            
            return delays;
        }
        
        // Получить максимальную задержку
        function getMaxDelay(delays) {
            return Math.max(...Object.values(delays), 0);
        }
        
        // ФУНКЦИЯ: Получить данные поезда
        async function getTrainData(trainId) {
            try {
                console.log("Fetching train data for ID:", trainId);
                const response = await fetch(`https://api.dmytrothemir.workers.dev/?id=${encodeURIComponent(trainId)}`);
                
                if (response.ok) {
                    const data = await response.json();
                    if (data.vehicle_journeys && data.vehicle_journeys.length > 0) {
                        console.log("Found train data");
                        return { 
                            data, 
                            hasRealTimeData: hasRealTimeDataSimple(data.vehicle_journeys[0])
                        };
                    }
                }
                
                return null;
                
            } catch (error) {
                console.error("Error fetching train data:", error);
                return null;
            }
        }
        
        // Упрощенное определение имени линии
        function getLineNameSimple(vehicleJourney) {
            // Просто используем headsign из данных поезда
            const headsign = vehicleJourney.headsign;
            
            // Если headsign начинается с K (K16), используем его
            if (headsign && headsign.startsWith('K')) {
                return headsign;
            }
            
            // Иначе используем name поезда или headsign
            return vehicleJourney.name || headsign || "TER";
        }
        
        // Упрощенное определение цвета линии
        function getLineColorSimple(lineName) {
            // Цвета для разных типов поездов
            if (lineName && lineName.startsWith('K')) {
                return "#0052a3"; // Синий для TER K-линий
            } else if (lineName && lineName.includes('TER')) {
                return "#0052a3"; // Синий для TER
            } else if (lineName && lineName.includes('TGV')) {
                return "#ed1c24"; // Красный для TGV
            } else if (lineName && lineName.includes('Transilien')) {
                return "#f9b000"; // Желтый для Transilien
            } else if (lineName && lineName.includes('Intercités')) {
                return "#009ade"; // Голубой для Intercités
            }
            
            return "#ffcc00"; // Желтый по умолчанию
        }
        
        // Основная функция загрузки данных
        async function loadTrainData() {
            const trainId = getTrainIdFromUrl();
            
            if (!trainId) {
                showError("ID du train manquant dans l'URL. Utilisez ?id=...");
                return;
            }
            
            try {
                console.log("Loading train data for:", trainId);
                const result = await getTrainData(trainId);
                
                if (!result) {
                    throw new Error("Impossible de charger les données du train");
                }
                
                displayTrainData(result.data, result.hasRealTimeData);
                currentTrainData = result.data;
                
            } catch (error) {
                console.error("Erreur lors du chargement des données:", error);
                showError("Impossible de charger les données du train. Vérifiez l'ID.");
            }
        }
        
        // Отображение данных поезда
        function displayTrainData(data, hasRealTimeData) {
            document.getElementById('loading').style.display = 'none';
            
            try {
                const vehicleJourney = data.vehicle_journeys?.[0];
                
                if (!vehicleJourney) {
                    showError("Aucune information trouvée pour ce train.");
                    return;
                }
                
                const stopTimes = vehicleJourney.stop_times || [];
                const lineName = getLineNameSimple(vehicleJourney);
                const lineColor = getLineColorSimple(lineName);
                
                // Показываем индикатор реального времени
                const realtimeIndicator = document.getElementById('realtime-indicator');
                if (hasRealTimeData) {
                    realtimeIndicator.style.display = 'block';
                    realtimeIndicator.textContent = '✅ Données temps réel';
                    realtimeIndicator.style.background = '#e8f5e8';
                    realtimeIndicator.style.color = '#2e7d32';
                } else {
                    realtimeIndicator.style.display = 'block';
                    realtimeIndicator.textContent = '⚠️ Données théoriques (hors temps réel)';
                    realtimeIndicator.style.background = '#fff3e0';
                    realtimeIndicator.style.color = '#ef6c00';
                }
                
                // Обновляем заголовок
                document.getElementById('line-name').textContent = lineName;
                document.getElementById('line-name').style.backgroundColor = lineColor;
                
                const trainNumber = vehicleJourney.name || vehicleJourney.id?.split(':')[3] || "N/A";
                document.getElementById('train-number').textContent = trainNumber;
                
                // Определяем пункт назначения
                let destination = "Destination inconnue";
                for (let i = stopTimes.length - 1; i >= 0; i--) {
                    if (!stopTimes[i].skipped_stop) {
                        destination = stopTimes[i].stop_point?.name || "Destination inconnue";
                        break;
                    }
                }
                document.getElementById('destination-name').textContent = destination;
                
                // Анализируем задержки
                const delays = analyzeDelaysSimple(vehicleJourney);
                const maxDelay = getMaxDelay(delays);
                
                // Отображаем задержку в заголовке
                const delayHeader = document.getElementById('delay-header');
                if (maxDelay > 0) {
                    delayHeader.textContent = `⚠️ Train en retard : ${maxDelay} minute${maxDelay > 1 ? 's' : ''}`;
                    delayHeader.style.display = 'block';
                } else {
                    delayHeader.style.display = 'none';
                }
                
                // Отображаем остановки
                displayStops(stopTimes, lineColor, delays, hasRealTimeData);
                
            } catch (error) {
                console.error("Erreur lors de l'analyse des données:", error);
                showError("Erreur dans le format des données reçues.");
            }
        }
        
        // Отображение остановок
        function displayStops(stopTimes, lineColor, delays, hasRealTimeData) {
            const stopsList = document.getElementById('stops-list');
            const moreIndicator = document.getElementById('more-indicator');
            const noMoreIndicator = document.getElementById('no-more-indicator');
            const timeline = document.getElementById('timeline');
            
            currentLineColor = lineColor;
            
            // Обновляем линию времени
            if (timeline) {
                timeline.style.backgroundColor = currentLineColor;
            }
            
            // Очищаем список
            const existingStops = stopsList.querySelectorAll('.stop-item');
            existingStops.forEach(stop => stop.remove());
            
            if (stopTimes.length === 0) {
                stopsList.innerHTML += '<div class="loading">Aucun arrêt trouvé</div>';
                moreIndicator.style.display = 'none';
                noMoreIndicator.style.display = 'block';
                return;
            }
            
            // Находим текущую остановку
            const currentStopIndex = findCurrentStopIndex(stopTimes);
            const currentMinutes = getCurrentMinutes();
            
            // Отображаем остановки
            let upcomingStopsShown = 0;
            const maxVisibleStops = 5; // Максимум остановок для показа
            
            for (let i = 0; i < stopTimes.length; i++) {
                const stop = stopTimes[i];
                if (stop.skipped_stop) continue;
                
                const status = getStopStatus(stop, currentMinutes);
                const stopName = stop.stop_point?.name || 'Arrêt inconnu';
                const stopTime = stop.departure_time || stop.arrival_time;
                
                // Форматируем время
                const formattedTime = stopTime 
                    ? stopTime.substring(0, 2) + ':' + stopTime.substring(2, 4)
                    : '--:--';
                
                const delayMinutes = delays[stop.stop_point?.id] || 0;
                
                // Создаем элемент остановки
                const stopItem = document.createElement('div');
                stopItem.className = 'stop-item';
                
                // Добавляем класс для пройденных остановок
                if (status === 'passed') {
                    stopItem.classList.add('stop-passed');
                }
                
                // Точка на линии
                const stopDot = document.createElement('div');
                stopDot.className = 'stop-dot';
                if (status === 'current') {
                    stopDot.classList.add('active');
                }
                stopDot.style.backgroundColor = status === 'passed' ? '#cccccc' : currentLineColor;
                stopItem.appendChild(stopDot);
                
                // Название остановки
                const stopNameEl = document.createElement('div');
                stopNameEl.className = 'stop-name';
                stopNameEl.textContent = stopName;
                
                // Время и задержка
                const stopTimeInfo = document.createElement('div');
                stopTimeInfo.className = 'stop-time';
                
                if (delayMinutes > 0 && hasRealTimeData) {
                    // Показываем задержку
                    const baseTime = stop.base_departure_time || stopTime;
                    const baseFormatted = baseTime 
                        ? baseTime.substring(0, 2) + ':' + baseTime.substring(2, 4)
                        : '--:--';
                    
                    const scheduledSpan = document.createElement('span');
                    scheduledSpan.className = 'scheduled-time';
                    scheduledSpan.textContent = baseFormatted;
                    
                    const actualSpan = document.createElement('span');
                    actualSpan.className = 'actual-time';
                    actualSpan.textContent = formattedTime;
                    
                    const delaySpan = document.createElement('span');
                    delaySpan.className = 'stop-delay';
                    delaySpan.textContent = `+${delayMinutes} min`;
                    
                    stopTimeInfo.appendChild(scheduledSpan);
                    stopTimeInfo.appendChild(actualSpan);
                    stopTimeInfo.appendChild(delaySpan);
                } else {
                    // Без задержки
                    stopTimeInfo.textContent = formattedTime;
                    
                    if (status === 'current' && hasRealTimeData) {
                        const onTimeSpan = document.createElement('span');
                        onTimeSpan.className = 'stop-on-time';
                        onTimeSpan.textContent = `À l'heure`;
                        stopTimeInfo.appendChild(onTimeSpan);
                    }
                }
                
                stopItem.appendChild(stopNameEl);
                stopItem.appendChild(stopTimeInfo);
                stopsList.appendChild(stopItem);
                
                // Считаем предстоящие остановки
                if (status === 'upcoming') {
                    upcomingStopsShown++;
                }
                
                // Ограничиваем количество показываемых остановок
                if (upcomingStopsShown >= maxVisibleStops && i > currentStopIndex) {
                    break;
                }
            }
            
            // Показываем индикатор дополнительных остановок
            const remainingStops = stopTimes.length - (currentStopIndex + upcomingStopsShown);
            if (remainingStops > 0) {
                moreIndicator.style.display = 'block';
                noMoreIndicator.style.display = 'none';
                moreIndicator.querySelector('.more-stops-arrow').style.color = currentLineColor;
            } else {
                moreIndicator.style.display = 'none';
                noMoreIndicator.style.display = 'block';
            }
        }
        
        // Показать ошибку
        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('error').textContent = message;
            document.getElementById('delay-header').style.display = 'none';
            document.getElementById('realtime-indicator').style.display = 'none';
        }
        
        // Автообновление
        function autoRefresh() {
            loadTrainData();
            setTimeout(autoRefresh, 30000); // Обновляем каждые 30 секунд
        }
        
        // Загрузка при старте
        document.addEventListener('DOMContentLoaded', () => {
            loadTrainData();
            // Запускаем автообновление
            setTimeout(autoRefresh, 30000);
        });
    </script>
</body>
</html>
